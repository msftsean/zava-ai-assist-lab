[pytest]
# ─────────────────────────────────────────────────────────────────────────
# Pytest configuration for AI Assist Lab
# ─────────────────────────────────────────────────────────────────────────

# Test discovery paths
testpaths = tests

# Custom markers
markers =
    unit: Unit tests (run by default, no external services needed)
    integration: Integration tests (require mocks or live Azure services)

# Default: run only unit tests (skip integration)
# To include integration tests:  pytest -m "unit or integration"
# To run everything:             pytest -m ""
addopts = -m "not integration" -v --tb=short

# Minimum pytest version
minversion = 7.0
